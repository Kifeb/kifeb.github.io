<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Home</title>
    <!-- Link Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #00FFDE; /* Background berubah menjadi #00FFDE */
            color: #333;
            font-family: 'Arial', sans-serif;
        }

        header {
            background-color: #4300FF; /* Header berubah menjadi #4300FF */
            color: white;
            padding: 50px 0;
        }

        .main-title {
            font-size: 48px;
            font-weight: bold;
        }

        .sub-title {
            font-size: 20px;
            font-weight: 300;
        }

        .button-container {
            margin-top: 30px;
        }

        .btn-custom {
            background-color: #4300FF; /* Tombol warna #4300FF */
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
        }

        .btn-custom:hover {
            background-color: #5C00FF; /* Warna tombol berubah saat hover */
        }

        .social-icons {
            margin-top: 30px;
        }

        .social-icons a {
            color: #4300FF; /* Ikon sosial warna #4300FF */
            font-size: 30px;
            margin: 0 15px;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            color: #5C00FF; /* Ikon sosial berubah warna saat hover */
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="container text-center">
            <h1 class="main-title">Hello, I'm [Nama Anda]</h1>
            <p class="sub-title">Web Developer | Designer | Creative Thinker</p>
            <div class="button-container">
                <a href="#about" class="btn btn-custom">About Me</a>
            </div>
            <div class="social-icons">
                <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
                <a href="https://www.github.com" target="_blank">GitHub</a>
                <a href="https://www.instagram.com" target="_blank">Instagram</a>
            </div>
        </div>
    </header>

    <!-- About Section (Placeholder) -->
    <section id="about" class="container mt-5">
        <h2>About Me</h2>
        <p>
            Write your about description here. Explain your background, skills, and passion for your work.
        </p>
    </section>

    <!-- Footer Section -->
    <footer class="text-center py-4" style="background-color: #4300FF; color: white;">
        <p>&copy; 2025 [Nama Anda]. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS and Popper.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

</body>
</html>
